<!DOCTYPE html>
<html>
<head>
    <title>Cinemax MD - WhatsApp Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
      .container {
            max-width: 450px;
            width: 100%;
            background: rgba(26, 26, 26, 0.95);
            padding: 40px 30px;
            border-radius: 20px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }
        h1 {
            color: #ff0000;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }
        p {
            text-align: center;
            color: #ccc;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 2px solid #333;
            background: #0a0a0a;
            color: white;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #ff0000;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.4);
        }
        #code {
            margin-top: 20px;
            padding: 15px;
            background: #0a0a0a;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #ff0000;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
      .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 CINEMAX MD 🎬</h1>
        <p>WhatsApp Number එක දාලා Pair Code ගන්න</p>
        <input type="text" id="phone" placeholder="+947xxxxxxxx">
        <button onclick="getCode()">Get Pair Code</button>
        <div id="code"></div>
        <div class="footer">Powered by Cinemax MD</div>
    </div>

    <script>
        async function getCode() {
            const phone = document.getElementById('phone').value
            if(!phone) return alert('Number එක දාන්න!')

            document.getElementById('code').innerText = '⏳ Loading...'
            try {
                const res = await fetch('/api/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: phone })
                })
                const data = await res.json()
                if(data.pairCode) {
                    document.getElementById('code').innerText = 'Pair Code: ' + data.pairCode
                } else {
                    document.getElementById('code').innerText = data.error || data.message
                }
            } catch (err) {
                document.getElementById('code').innerText = 'Error: ' + err.message
            }
        }
    </script>
</body>
</html>
